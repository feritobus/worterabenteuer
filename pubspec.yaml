name: worterabenteuer
description: "App de vocabulario aleman para ninos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # Auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.0

  # State & Navigation
  flutter_riverpod: ^2.5.0
  go_router: ^14.3.0

  # ML Kit
  google_mlkit_digital_ink_recognition: ^0.12.0
  google_mlkit_text_recognition: ^0.13.0

  # Speech
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image
  image_picker: ^1.1.0

  # UI
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0

  # Permissions (required transitively by speech_to_text + image_picker on Android)
  permission_handler: ^11.3.0

  # Utils
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/sounds/
    - assets/images/
